<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive QR Code Generator</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="container">
    <h1>URL to QR Code Generator</h1>
    <input type="url" id="url" placeholder="Enter a URL">

    <div class="options">
      <label for="size">Size:</label>
      <input type="number" id="size" value="200" min="100" max="500">

      <label for="colorDark">Dark Color:</label>
      <input type="color" id="colorDark" value="#000000">

      <label for="colorLight">Light Color:</label>
      <input type="color" id="colorLight" value="#ffffff">
    </div>

    <div id="qrcode" class="qrcode"></div>
    <button id="downloadBtn" style="display:none;">Download QR Code</button>
  </div>

  <!-- QRCode.js library -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
